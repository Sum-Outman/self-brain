version: '3.8'

services:
  # Development Management Service
  manager:
    build: .
    container_name: self-brain-manager-dev
    command: python manager_model/app.py
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    depends_on:
      - d_image
      - e_video
      - f_spatial
      - g_sensor
      - h_computer_control
      - i_knowledge
      - j_motion
      - k_programming
    networks:
      - self-brain-network
    restart: unless-stopped

  # Development Image Processing Service
  d_image:
    build: .
    container_name: self-brain-d-image-dev
    command: python sub_models/D_image/app.py
    ports:
      - "5004:5004"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PORT=5004
      - FLASK_ENV=development
    networks:
      - self-brain-network
    restart: unless-stopped

  # Development Video Processing Service
  e_video:
    build: .
    container_name: self-brain-e-video-dev
    command: python sub_models/E_video/app.py
    ports:
      - "5005:5005"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PORT=5005
      - FLASK_ENV=development
    networks:
      - self-brain-network
    restart: unless-stopped

  # Development Spatial Positioning Service
  f_spatial:
    build: .
    container_name: self-brain-f-spatial-dev
    command: python sub_models/F_spatial/app.py
    ports:
      - "5006:5006"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PORT=5006
      - FLASK_ENV=development
    networks:
      - self-brain-network
    restart: unless-stopped

  # Development Sensor Service
  g_sensor:
    build: .
    container_name: self-brain-g-sensor-dev
    command: python sub_models/G_sensor/app.py
    ports:
      - "5007:5007"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PORT=5007
      - FLASK_ENV=development
    networks:
      - self-brain-network
    restart: unless-stopped

  # Development Computer Control Service
  h_computer_control:
    build: .
    container_name: self-brain-h-control-dev
    command: python sub_models/H_computer_control/app.py
    ports:
      - "5008:5008"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PORT=5008
      - FLASK_ENV=development
    networks:
      - self-brain-network
    restart: unless-stopped

  # Development Knowledge Service
  i_knowledge:
    build: .
    container_name: self-brain-i-knowledge-dev
    command: python sub_models/I_knowledge/app.py
    ports:
      - "5009:5009"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PORT=5009
      - FLASK_ENV=development
    networks:
      - self-brain-network
    restart: unless-stopped

  # Development Motion Control Service
  j_motion:
    build: .
    container_name: self-brain-j-motion-dev
    command: python sub_models/J_motion/app.py
    ports:
      - "5010:5010"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PORT=5010
      - FLASK_ENV=development
    networks:
      - self-brain-network
    restart: unless-stopped

  # Development Programming Service
  k_programming:
    build: .
    container_name: self-brain-k-programming-dev
    command: python sub_models/K_programming/app.py
    ports:
      - "5011:5011"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PORT=5011
      - FLASK_ENV=development
    networks:
      - self-brain-network
    restart: unless-stopped

  # Development Web Interface
  web_interface:
    build: .
    container_name: self-brain-web-dev
    command: python web_interface/app.py
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    environment:
      - PYTHONPATH=/app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    depends_on:
      - d_image
      - e_video
      - f_spatial
      - g_sensor
      - h_computer_control
      - i_knowledge
      - j_motion
      - k_programming
    networks:
      - self-brain-network
    restart: unless-stopped

networks:
  self-brain-network:
    driver: bridge

volumes:
  data:
  logs: